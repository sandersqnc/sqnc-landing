<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEQUENCE — Supplement that learns from your biomarkers</title>
<meta name="description" content="SQNC calibrates your daily supplement to your blood work and wearable data — then measures what actually works. Join the waiting list.">
<meta name="theme-color" content="#072B18">
<meta property="og:title" content="SEQUENCE — Supplement that learns from your biomarkers">
<meta property="og:description" content="Blood-tested, wearable-connected, re-formulated monthly. Join the waiting list.">
<meta property="og:type" content="website">
<meta property="og:image" content="assets/hero-1200.jpg">
<link rel="icon" href="assets/SQNC_V_GREEN.svg">
<link rel="preload" href="assets/fonts/matter-600.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/matter-500.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" as="image" imagesrcset="assets/cyclist-3600.webp 1x, assets/cyclist-6400.webp 2x" media="(min-width: 800px)">
<link rel="preload" href="assets/cyclist-mobile.webp" as="image" media="(max-width: 799px)">
<style>
/* ============================================================
   SEQUENCE — production teaser v1 (from Figma draft 5rfsnt74)
   Vanilla, self-contained, tuned for LCP + snap.
   ============================================================ */
/* Brand trial fonts — Matter (body/UI) + Season Mix (display) */
@font-face{font-family:'Matter';font-style:normal;font-weight:400;font-display:swap;
  src:url('assets/fonts/matter-400.woff2') format('woff2')}
@font-face{font-family:'Matter';font-style:normal;font-weight:500;font-display:swap;
  src:url('assets/fonts/matter-500.woff2') format('woff2')}
@font-face{font-family:'Matter';font-style:normal;font-weight:600;font-display:swap;
  src:url('assets/fonts/matter-600.woff2') format('woff2')}
@font-face{font-family:'Season Mix';font-style:normal;font-weight:400;font-display:swap;
  src:url('assets/fonts/seasonmix-400.woff2') format('woff2')}
@font-face{font-family:'Season Sans';font-style:normal;font-weight:500;font-display:swap;
  src:url('assets/fonts/seasonsans-500.woff2') format('woff2')}

:root{
  --green:#072B18; --green-soft:#375443; --mineral:#F6F9F2;
  --lime:#B1FC63; --lime-deep:#8DF229; --orange:#FE5B04; --amber:#B89143;
  --opt:#B9FF2E; --bord:#ffff3f; --need:#FAB14A;
  --ink-60:rgba(255,255,255,.74);
  --ease:cubic-bezier(.16,1,.3,1);
  --sans:'Matter','Inter',system-ui,-apple-system,sans-serif;
  --serif:'Season Mix',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:clip;scroll-behavior:smooth}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{font-family:var(--sans);color:var(--green);background:#fff;
  overflow-x:clip;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
img{display:block;max-width:100%}
::selection{background:var(--lime);color:var(--green)}

/* ---------- HERO ---------- */
.hero{position:relative;min-height:100svh;display:flex;flex-direction:column;
  align-items:center;isolation:isolate;overflow:clip;padding:0 clamp(18px,2.4vw,44px) 56px}
.hero-bg{position:absolute;inset:0;z-index:-1;background:#aecadd;
  background-image:url(assets/cyclist-3600.webp);
  background-image:-webkit-image-set(url(assets/cyclist-3600.webp) 1x,url(assets/cyclist-6400.webp) 2x);
  background-image:image-set(url(assets/cyclist-3600.webp) 1x,url(assets/cyclist-6400.webp) 2x);
  background-repeat:no-repeat;background-size:cover;background-position:60% 32%}
.hero-bg::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(to bottom,transparent 88%,rgba(255,255,255,.42))}

/* nav — transparent over the sky */
.nav{position:relative;z-index:5;width:100%;max-width:none;display:flex;
  align-items:center;justify-content:space-between;padding:22px 2px 8px}
.nav-logo img{height:18px;width:auto;display:block}
.nav-right{display:flex;align-items:center;gap:clamp(18px,2.4vw,40px)}
.nav-right a{color:var(--green);text-decoration:none;font-weight:500;font-size:15px;
  transition:opacity .18s var(--ease),background .18s var(--ease)}
.nav-right a:not(.nav-cta):hover{opacity:.6}
.nav-right a.nav-cta{background:var(--green);color:#fff;padding:9px 17px;border-radius:999px;font-weight:500;font-size:14px}
.nav-right a.nav-cta:hover{background:#0b3f24;opacity:1}

/* hero content */
.hero-inner{flex:1;display:flex;flex-direction:column;align-items:center;width:100%;
  padding-top:clamp(24px,4.5svh,60px)}
.headline{max-width:min(1000px,92%);text-align:center;font-weight:600;
  font-size:clamp(1.85rem,4.2vw,3.3rem);line-height:1.14;letter-spacing:-.018em;
  color:var(--green);text-wrap:balance}
.headline .nw{white-space:nowrap}
.chip{display:inline-block;height:.86em;aspect-ratio:7/5;vertical-align:-.18em;
  background:#fff;border-radius:.16em;padding:.08em;object-fit:contain;
  box-shadow:0 3px 10px rgba(7,43,24,.14);border:1px solid rgba(255,255,255,.9);margin:0 .16em}
.chip.ring{height:.84em;padding:.06em}
.chip.whoop{height:.92em}
.pill{display:inline-block;height:.92em;width:auto;vertical-align:middle;margin:0 .12em;
  border-radius:.5em;box-shadow:0 4px 14px rgba(7,43,24,.16)}
/* wearable carousel — devices slide out right, next slides in from left */
.wear{position:relative;width:auto;aspect-ratio:174/62;overflow:hidden;isolation:isolate;
  background:#e7cf14 url(assets/chip-band.png) center/cover no-repeat}
.wear .ws{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  will-change:transform;transition:transform .55s cubic-bezier(.66,0,.24,1)}
.wear .ws img{height:86%;width:auto;max-width:60%;object-fit:contain;display:block;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.28))}
@media(prefers-reduced-motion:reduce){.wear .ws{transition:none}}
.subline{margin-top:18px;font-size:clamp(1rem,1.5vw,1.24rem);font-weight:500;
  font-family:'Season Sans','Season Mix',Georgia,serif;
  color:rgba(7,43,24,.6);text-align:center;text-wrap:balance}

/* modern email field — clean pill + inset lime button */
.capture{margin-top:clamp(26px,4svh,40px);width:min(560px,100%);display:flex;flex-direction:column;align-items:center}
.field{display:flex;align-items:center;gap:12px;width:100%;
  background:rgba(255,255,255,.94);border:1px solid rgba(7,43,24,.09);border-radius:999px;
  padding:8px 8px 8px 24px;box-shadow:0 14px 44px -12px rgba(7,43,24,.3);
  transition:transform .25s var(--ease),box-shadow .25s var(--ease)}
.field:focus-within{transform:translateY(-2px);box-shadow:0 18px 52px -12px rgba(7,43,24,.36)}
.field .mail{flex-shrink:0;opacity:.55}
.field input{flex:1;min-width:0;border:0;background:transparent;padding:14px 0;
  font-family:var(--sans);font-size:16.5px;font-weight:500;color:var(--green)}
.field input::placeholder{color:rgba(7,43,24,.5)}
.field input:focus{outline:none}
.field button{position:relative;isolation:isolate;display:inline-flex;align-items:center;gap:8px;border:0;cursor:pointer;flex-shrink:0;
  padding:14px 22px;background:var(--green);color:var(--lime);border-radius:999px;
  font-family:var(--sans);font-weight:600;font-size:15.5px;white-space:nowrap;
  transition:background .18s var(--ease)}
.field button:hover{background:#0b3f24}
.field button svg{transition:transform .22s var(--ease)}
.field button:hover svg{transform:translateX(3px)}
.field button[disabled]{opacity:.7;cursor:wait}
.micro{margin-top:13px;text-align:center;font-size:12.5px;font-weight:500;
  letter-spacing:.04em;color:rgba(7,43,24,.6)}
.joined-pill{display:none;align-items:center;justify-content:center;gap:12px;width:100%;height:62px;
  border-radius:999px;background:var(--green);color:#fff;box-shadow:0 14px 44px -12px rgba(7,43,24,.3)}
.joined-pill b{font-weight:600;font-size:16px}
.is-joined .field,.is-joined .micro{display:none}
.is-joined .joined-pill{display:flex}

/* glass biomarker cards */
.cards{position:relative;margin-top:clamp(28px,5svh,56px);width:min(600px,100%);
  display:flex;flex-direction:column;gap:14px;align-items:center}
.glass{--r:24px;position:relative;border-radius:var(--r);
  background:rgba(37,42,46,.52);backdrop-filter:blur(16px) saturate(1.05);
  -webkit-backdrop-filter:blur(16px) saturate(.92);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 13px 60px rgba(0,0,0,.14);
  color:#fff;padding:20px 24px;width:100%;
  transition:transform .3s var(--ease)}
.glass:hover{transform:translateY(-3px)}
.g-label{display:flex;align-items:center;gap:10px;font-size:12.5px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--ink-60)}
.g-label svg{opacity:.95}
.card-blood{max-width:440px;align-self:center}
.blood-stats{display:flex;gap:34px;margin:16px 0 18px}
.blood-stats b{display:block;font-family:var(--serif);font-weight:420;font-size:34px;
  line-height:1;color:#fff}
.blood-stats span{display:block;margin-top:7px;font-size:13.5px;font-weight:600;letter-spacing:.04em}
.s-opt span{color:var(--opt)} .s-bord span{color:var(--bord)} .s-need span{color:var(--need)}
.tri{display:flex;gap:6px;height:10px;border-radius:9px}
.tri i{border-radius:9px;filter:blur(1.3px);opacity:.98}
.tri .a{flex:1;background:linear-gradient(90deg,#8df229,#e2f53a);box-shadow:0 0 15px 1px rgba(160,240,44,.6)}
.tri .b{width:24%;background:#ff7327;box-shadow:0 0 15px 1px rgba(255,115,39,.55)}
.tri .c{width:11%;background:#ff3227;box-shadow:0 0 15px 1px rgba(255,50,39,.55)}
.vial{position:absolute;right:75px;top:18px;height:82px;width:auto;filter:drop-shadow(0 6px 13px rgba(0,0,0,.4));pointer-events:none}
.card-hrv{max-width:600px;display:flex;flex-direction:column;gap:14px}
.hrv-row{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center}
.card-hrv .watch{width:86px;height:86px;object-fit:contain;filter:drop-shadow(0 6px 14px rgba(0,0,0,.4))}
.hrv-mid .g-label{margin-bottom:12px}
.hrv-title{font-family:var(--serif);font-weight:420;font-size:clamp(19px,2.2vw,24px);line-height:1.08}
.hrv-ms{margin-top:5px;font-size:14px;font-weight:600;color:rgba(255,255,255,.92)}
.hrv-tags{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.hrv-tags span{padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:600;
  background:rgba(214,220,225,.9);color:#262b2f}
.trend{flex-shrink:0;width:118px}
.trend img{width:100%;height:auto;display:block}
.card-chat{max-width:500px;position:relative;overflow:hidden;isolation:isolate}
.card-chat::before{content:"";position:absolute;z-index:-1;left:6%;right:28%;bottom:-30px;height:72px;
  background:linear-gradient(90deg,rgba(141,242,41,.42),rgba(255,115,39,.3) 60%,rgba(255,50,39,.25));filter:blur(24px);pointer-events:none}
.card-chat .q{margin-top:14px;font-size:15px;color:rgba(255,255,255,.82)}
.card-chat .a{margin-top:6px;font-family:var(--serif);font-weight:420;font-size:22px}

/* ---------- SOCIAL PROOF + LOGO MARQUEE ---------- */
.social{background:#fff;padding:clamp(40px,5.5vw,80px) 0 clamp(40px,5vw,72px)}
.social-head{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;
  gap:clamp(12px,1.5vw,19px);max-width:1040px;margin:0 auto;padding:0 clamp(20px,4vw,44px);text-align:center}
.avatar-stack{height:36px;width:auto;flex-shrink:0}
.social-text{font-family:var(--serif);font-weight:500;color:#141414;
  font-size:clamp(1.02rem,1.65vw,1.55rem);letter-spacing:-.01em;line-height:1.32;text-wrap:balance}
.marquee{position:relative;margin-top:clamp(30px,4vw,56px);width:100%;overflow:hidden;height:clamp(50px,6vw,66px);
  -webkit-mask:linear-gradient(to right,transparent,#000 9%,#000 91%,transparent);
  mask:linear-gradient(to right,transparent,#000 9%,#000 91%,transparent)}
.marquee-row{position:absolute;top:0;left:0;height:100%;display:flex;align-items:center;
  gap:clamp(46px,6vw,92px);width:max-content;animation:marquee 40s linear infinite;animation-play-state:paused;will-change:transform}
.marquee.go .marquee-row{animation-play-state:running}
.marquee:hover .marquee-row{animation-play-state:paused}
.mlogo{height:auto;max-height:30px;max-width:150px;width:auto;object-fit:contain;opacity:.6;filter:grayscale(1);flex-shrink:0}
@keyframes marquee{from{transform:translateX(-50%)}to{transform:translateX(0)}}
html.static .marquee-row{animation:none!important}
@media(prefers-reduced-motion:reduce){.marquee-row{animation:none;transform:none}}
@media(max-width:720px){
  .social{padding-top:20px;padding-bottom:26px}
  .social-head{flex-direction:column;gap:10px}
  .avatar-stack{height:30px}
  .social-text{font-size:0.9rem;line-height:1.3}
  .marquee{margin-top:18px;height:40px}
  .marquee-row{gap:30px}
  .mlogo{max-height:18px;max-width:88px;opacity:.6}
}

/* ---------- CALIBRATE ---------- */
.calibrate{background:var(--mineral);padding:clamp(64px,9vw,120px) clamp(18px,4vw,56px)}
.cal-head{max-width:1280px;margin:0 auto;text-align:center;
  font-weight:500;font-size:clamp(1.55rem,3.05vw,3rem);line-height:1.2;letter-spacing:-.01em}
.cal-head .sqnc-pill{display:inline-flex;align-items:center;justify-content:center;
  vertical-align:middle;background:var(--green);border-radius:999px;
  padding:.18em .5em;margin-right:.28em;transform:translateY(-.06em)}
.cal-head .sqnc-pill img{height:.72em;width:auto}
.cal-grid{max-width:1220px;margin:clamp(36px,5vw,64px) auto 0;
  display:grid;grid-template-columns:1fr 1fr;gap:clamp(16px,2.4vw,28px)}
.panel{position:relative;border-radius:28px;overflow:hidden;min-height:640px;
  display:flex;flex-direction:column;justify-content:flex-end}
.panel-bg{position:absolute;inset:0}
.panel-bg img{width:100%;height:100%;object-fit:cover}
/* left: app panel */
.p-app .panel-bg::after{content:"";position:absolute;inset:0;
  background:linear-gradient(200deg,rgba(7,43,24,.05),rgba(7,43,24,.32) 90%)}
.p-app{align-items:center;justify-content:center;padding:clamp(24px,3vw,44px)}
.p-app .phone{position:relative;width:min(300px,58%);filter:drop-shadow(0 30px 60px rgba(0,0,0,.4))}
.mini-stack{position:absolute;left:clamp(14px,2vw,28px);top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:14px;width:min(250px,44%)}
.mini{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-radius:18px;
  padding:16px 18px;box-shadow:0 11px 56px rgba(0,0,0,.12);
  display:flex;flex-direction:column;gap:10px;
  transition:transform .3s var(--ease)}
.mini:hover{transform:translateY(-3px)}
.mini h3{font-size:12.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green-soft)}
.mini .row{display:flex;align-items:center;gap:10px;min-height:34px}
.mini .row img{height:34px;width:auto;object-fit:contain}
.mini .row .bubble{height:26px}
/* right: 40+ ingredients panel */
.p-ing .panel-bg::after{content:"";position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.55) 6%,rgba(7,43,24,.12) 55%,rgba(7,43,24,.45) 100%)}
.p-ing{padding:clamp(24px,3vw,44px);justify-content:space-between;color:#fff}
.p-ing .top h2{font-family:var(--serif);font-weight:430;font-size:clamp(3rem,5.4vw,5rem);line-height:1}
.p-ing .top p{margin-top:10px;font-size:clamp(1.15rem,1.8vw,1.7rem);font-weight:500;max-width:20ch;line-height:1.3}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}
.chips span{padding:9px 16px;border-radius:999px;background:rgba(184,145,67,.92);
  backdrop-filter:blur(6px);color:#fff;font-weight:600;font-size:clamp(.95rem,1.25vw,1.15rem);
  transition:transform .2s var(--ease)}
.chips span:hover{transform:translateY(-2px)}

/* ---------- FOOTER ---------- */
footer{background:var(--green);color:#fff;padding:56px clamp(18px,4vw,56px) 40px}
.foot{max-width:1220px;margin:0 auto;display:flex;flex-direction:column;gap:26px}
.foot .mark img{height:22px;width:auto}
.foot-row{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;
  font-size:13.5px;color:rgba(255,255,255,.72)}
.foot-row a{color:rgba(255,255,255,.85);text-decoration:none}
.foot-row a:hover{color:#fff}

/* ---------- MOTION — opening settle-in ---------- */
@keyframes settle{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes settleFg{from{opacity:0;transform:translateY(34px) scale(1.04)}to{opacity:1;transform:none}}
.rv{opacity:0;animation:settle .72s var(--ease) both;animation-delay:var(--d,0ms)}
.hero-fg{opacity:0;animation:settleFg 1.05s var(--ease) .5s both}
html.static .rv,html.static .hero-fg{animation:none!important;opacity:1!important;transform:none!important}
html.static .hero{min-height:860px!important}
@media(prefers-reduced-motion:reduce){
  .rv{animation:none;opacity:1;transform:none}
  .hero-fg{animation:none;opacity:1;transform:none}
  .glass:hover{transform:none}
}

/* ---------- RESPONSIVE ---------- */
@media(max-width:1024px){
  /* tablet + mobile: man-free sky bg + a tight cutout of the man anchored bottom-RIGHT, in front of the cards (no double image) */
  .hero-bg img{object-position:52% 18%}
  .hero-fg{right:-4%;bottom:-13vw;width:min(66vw,820px)}
}
/* desktop single-view: compress hero + model so the "Built by..." row + logo
   marquee land within one screen (no scroll). Model reframed smaller/higher. */
@media(min-width:1025px){
  /* premium full-bleed hero — matches Figma 60:10779 (1920x1102) */
  .hero{min-height:auto;aspect-ratio:1920/1102;justify-content:center;
    padding:0 clamp(40px,3.75vw,72px)}
  html.static .hero{min-height:auto!important}
  .hero-bg{background-size:216.8% auto;background-position:74% 17%}
  .nav{position:absolute;top:22px;left:0;right:0;padding:0 clamp(40px,3.75vw,72px)}
  .nav-logo img{height:19.5px}
  .nav-right{gap:clamp(28px,2.4vw,44px)}
  .nav-right a{font-size:18px}
  .nav-cta{padding:13px 24px;font-size:17px}
  .hero-inner{flex:0 1 auto;justify-content:center;padding:0;transform:translateY(6.5%)}
  .headline{max-width:min(1240px,94%);font-weight:500;font-size:clamp(2.6rem,3.6vw,4.4rem);
    line-height:1.08;letter-spacing:-.012em;text-wrap:wrap}
  .subline{margin-top:clamp(28px,2.2vw,42px);font-family:'Season Sans','Season Mix',Georgia,serif;font-weight:500;font-size:26.25px;color:rgba(7,43,24,.9)}
  .capture{width:min(880px,94%);margin-top:clamp(32px,2.6vw,46px)}
  .field{padding:11px 12px 11px 34px;gap:14px}
  .field .mail{width:26px;height:26px}
  .field input{font-size:clamp(18px,1.45vw,27px)}
  .field button{padding:16px 28px;font-size:clamp(15px,1vw,18px)}
  .field button svg{width:22px;height:22px}
  .pill{height:.86em;border:2px solid rgba(255,255,255,.8)}
}
@media(max-width:720px){
  /* bottle-forward: cutout scaled down + shifted right so the SQNC bottle leads and the head is a smaller supporting element (not co-focus) */
  /* content-driven height (no full-screen blue gap) + model raised to fill the space */
  /* premium portrait hero — Figma 61:11102: cyclist+bike photo, white centered
     copy over a dark top scrim, glass form over the photo */
  .hero{min-height:100svh;justify-content:center;padding:0}
  html.static .hero{min-height:100svh!important}
  .hero-bg{background-image:url(assets/cyclist-mobile.webp);background-size:cover;background-position:left center}
  .hero-bg::after{background:linear-gradient(to bottom,rgba(4,10,6,.4) 0%,rgba(4,10,6,.52) 42%,rgba(4,10,6,.4) 60%,rgba(4,10,6,.1) 80%,transparent 93%)}
  .nav{position:absolute;top:0;left:0;right:0;z-index:5;padding:16px 18px 0}
  .nav-logo img{height:16px;filter:brightness(0) invert(1)}
  .nav-right a:not(.nav-cta){display:none}
  .nav-cta{padding:7px 13px;font-size:11px}
  .hero-inner{flex:0 0 auto;width:100%;padding:0 18px;align-items:center;transform:translateY(-3%)}
  .headline{color:#fff;font-weight:500;max-width:330px;
    font-size:clamp(1.5rem,6.9vw,1.85rem);line-height:1.15;letter-spacing:-.018em}
  .subline{color:#fff;margin-top:12px;font-size:16px;max-width:330px}
  .chip{height:.8em}
  /* smaller, stepped cards — middle (wearable) largest, like desktop (room to scroll later) */
  .cards{width:min(430px,92%);gap:11px}
  .glass{padding:15px 18px;--r:20px}
  .card-blood{max-width:87%}
  .card-hrv{max-width:100%}
  .hrv-row{grid-template-columns:auto 1fr auto;gap:9px}
  .card-chat{max-width:79%}
  .card-hrv .trend{width:70px}

<script>
(function () {
  'use strict';
  var STATIC = /[?&#]static/.test(location.href); // QA/screenshot mode
  if (STATIC) document.documentElement.classList.add('static');

  /* Logo marquee — clone the base set until the track is >= 2x its container,
     so the CSS translateX(-50%) loop is always seamless (no gap on wide screens). */
  (function () {
    var rows = document.querySelectorAll('.marquee-row');
    if (!rows.length) return;
    var marquee = rows[0].parentElement;
    rows.forEach(function (track) {
      var base = track.innerHTML, guard = 0;
      while (track.scrollWidth < marquee.offsetWidth * 2 && guard < 10) { track.innerHTML += base; guard++; }
    });
    requestAnimationFrame(function () { marquee.classList.add('go'); });
  })();

  /* Waitlist — optimistic POST; wire a real endpoint (Loops/Formspree/own API) at /api/waitlist. */
  var KEY = 'sqnc_waitlist';
  var form = document.getElementById('waitlist');
  var email = document.getElementById('email');
  var cta = document.getElementById('cta');
  var qn = document.getElementById('qn');
  var wrap = form.parentElement;

  function hash(s){var h=5381,i=s.length;while(i)h=(h*33)^s.charCodeAt(--i);return h>>>0}
  function joined(rec){ qn.textContent = String(rec.n).padStart(4,'0'); wrap.classList.add('is-joined'); }
  if (/[?&#]reset/.test(location.href)) { try{localStorage.removeItem(KEY)}catch(e){} }
  try{var prev=JSON.parse(localStorage.getItem(KEY)); if(prev&&prev.n) joined(prev);}catch(e){}

  form.addEventListener('submit', function (ev) {
    ev.preventDefault();
    var v = (email.value || '').trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v)) { email.focus(); return; }
    cta.disabled = true;
    var rec = { email: v, n: 137 + (hash(v) % 60), ts: new Date().toISOString(), variant: 'site-v1' };
    try{fetch('/api/waitlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rec)}).catch(function(){})}catch(e){}
    setTimeout(function(){ try{localStorage.setItem(KEY, JSON.stringify(rec))}catch(e){}; joined(rec); cta.disabled=false; }, STATIC?0:300);
  });

  /* wearable carousel — current device slides out to the right, next enters from the left */
  (function(){
    var wear=document.querySelector('.wear'); if(!wear) return;
    var ws=wear.querySelectorAll('.ws');
    var im=[ws[0].querySelector('img'), ws[1].querySelector('img')];
    var dev=['assets/wear-apple.png','assets/wear-oura.png','assets/wear-garmin.png','assets/wear-whoop.png'];
    var i=0, a=0;
    im[0].src=dev[0]; ws[0].style.transform='translateX(0)';
    im[1].src=dev[1]; ws[1].style.transform='translateX(-100%)';
    if (STATIC || (window.matchMedia && matchMedia('(prefers-reduced-motion:reduce)').matches)) return;
    function tick(){
      var b=1-a, n=(i+1)%dev.length;
      im[b].src=dev[n];
      ws[b].style.transition='none'; ws[b].style.transform='translateX(-100%)';
      void wear.offsetWidth;                     /* reflow so the reset lands without a slide */
      ws[b].style.transition='';
      ws[a].style.transform='translateX(100%)';  /* current slides out to the right */
      ws[b].style.transform='translateX(0)';     /* next slides in from the left */
      a=b; i=n;
    }
    var t=setInterval(tick, 2600);
    document.addEventListener('visibilitychange', function(){ clearInterval(t); if(!document.hidden) t=setInterval(tick,2600); });
  })();

  /* Opening settle-in is pure CSS (keyframes on .rv / .hero-fg with staggered delays). */
})();
</script>
